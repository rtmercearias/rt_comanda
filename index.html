<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Comandas</title>

  <!-- Configurações para instalar como App (PWA) -->
  <meta name="theme-color" content="#121214">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Comandas">

  <!-- Ícone do Aplicativo -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23734bd1'/><text x='50%' y='65%' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>📋</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23734bd1'/><text x='50%' y='65%' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>📋</text></svg>">

  <!-- Web App Manifest (Embutido) -->
  <link rel="manifest" href="data:application/manifest+json;utf8,{%22name%22:%22Sistema%20de%20Comandas%22,%22short_name%22:%22Comandas%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23121214%22,%22theme_color%22:%22%23734bd1%22,%22icons%22:[{%22src%22:%22data:image/svg%2Bxml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23734bd1'/><text x='50%' y='65%' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>📋</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg%2Bxml%22}]}">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    body {
      background-color: #121214;
      color: #e1e1e6;
      padding-bottom: 80px;
    }

    /* Topo */
    header {
      background: #1d1b26;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .search-box {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #323238;
      background: #202024;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    /* Cards Grid */
    .grid-comandas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .card {
      background: linear-gradient(135deg, #2d2a3e 0%, #1f1b2d 100%);
      border: 1px solid #3e3859;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 130px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .card-time {
      font-size: 11px;
      color: #a8a8b3;
    }

    .card-status {
      font-size: 11px;
      color: #fba94c;
      font-weight: 600;
      margin-top: 4px;
    }

    .card-total {
      font-size: 18px;
      font-weight: bold;
      color: #04d361;
      text-align: right;
      margin-top: 10px;
    }

    /* Botão Flutuante */
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #734bd1;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 6px 15px rgba(115, 75, 209, 0.5);
      cursor: pointer;
      z-index: 99;
    }

    /* Modais */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #202024;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      margin-bottom: 16px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #a8a8b3;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #323238;
      background: #121214;
      color: #fff;
      font-size: 15px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-primary { background: #734bd1; color: #fff; }
    .btn-secondary { background: #323238; color: #fff; }
    .btn-danger { background: #f75a68; color: #fff; }

    /* Lista de Itens */
    .item-list {
      margin: 12px 0;
      border-top: 1px solid #323238;
      padding-top: 10px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #29292e;
    }
  </style>
</head>
<body>

  <header>
    <input type="text" id="searchInput" class="search-box" placeholder="Pesquisar por nome do cliente...">
  </header>

  <main class="grid-comandas" id="comandasGrid"></main>

  <button class="fab" id="btnAbrirNovaComanda">+ Nova Comanda</button>

  <!-- Modal Nova Comanda -->
  <div class="modal-overlay" id="modalNovaComanda">
    <div class="modal">
      <h3>Abrir Comanda</h3>
      <div class="form-group">
        <label>Nome do Cliente</label>
        <input type="text" id="novoClienteNome" placeholder="Ex: Marcio, Dimi, Ale...">
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="btnCancelarNovaComanda">Cancelar</button>
        <button class="btn btn-primary" id="btnCriarComanda">Criar</button>
      </div>
    </div>
  </div>

  <!-- Modal Detalhes / Consumo -->
  <div class="modal-overlay" id="modalDetalhes">
    <div class="modal">
      <h3 id="detalheClienteTitulo">Comanda</h3>
      
      <div class="item-list" id="detalheItensLista"></div>

      <div style="font-size: 18px; font-weight: bold; text-align: right; margin-bottom: 16px; color: #04d361;" id="detalheTotal">
        Total: R$ 0,00
      </div>

      <hr style="border-color: #323238; margin-bottom: 16px;">

      <h4 style="margin-bottom: 8px;">Adicionar Item</h4>
      <div class="form-group">
        <label>Produto Cadastrado</label>
        <select id="selectProduto">
          <option value="">-- Selecione ou digite avulso --</option>
          <option value="Coca-Cola 2L" data-preco="12.00">Coca-Cola 2L - R$ 12,00</option>
          <option value="Cerveja Lata" data-preco="5.00">Cerveja Lata - R$ 5,00</option>
          <option value="Salgado" data-preco="7.00">Salgado - R$ 7,00</option>
          <option value="Café Expresso" data-preco="3.50">Café Expresso - R$ 3,50</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nome do Item / Descrição</label>
        <input type="text" id="itemNome" placeholder="Ex: Preço Avulso ou Cerveja">
      </div>

      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" step="0.01" id="itemValor" placeholder="0.00">
      </div>

      <button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" id="btnInserirConsumo">+ Inserir na Comanda</button>

      <div class="btn-group">
        <button class="btn btn-danger" id="btnFecharComanda">Fechar / Pagar</button>
        <button class="btn btn-secondary" id="btnSairDetalhes">Sair</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      let comandas = [
        { id: 1, cliente: "DIMI", hora: "17:32", itens: [{ desc: "Salgado", valor: 7.00 }] },
        { id: 2, cliente: "ALE", hora: "17:34", itens: [{ desc: "Café Expresso", valor: 3.50 }] },
        { id: 3, cliente: "MARCIO", hora: "17:51", itens: [] }
      ];

      let comandaAtualId = null;

      function renderizarComandas(lista = comandas) {
        const grid = document.getElementById('comandasGrid');
        grid.innerHTML = '';

        lista.forEach(c => {
          const total = c.itens.reduce((acc, curr) => acc + curr.valor, 0);
          const consumoTexto = c.itens.length > 0 ? `R$ ${total.toFixed(2)}` : 'Sem consumo';

          const card = document.createElement('div');
          card.className = 'card';
          card.onclick = () => abrirDetalhesComanda(c.id);
          card.innerHTML = `
            <div>
              <div class="card-header">
                <span class="card-title">${c.cliente}</span>
                <span class="card-time">${c.hora}</span>
              </div>
              <div class="card-status">PENDENTE</div>
            </div>
            <div class="card-total">${consumoTexto}</div>
          `;
          grid.appendChild(card);
        });
      }

      function abrirModalNovaComanda() {
        document.getElementById('novoClienteNome').value = '';
        document.getElementById('modalNovaComanda').style.display = 'flex';
      }

      function fecharModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
      }

      function criarComanda() {
        const nome = document.getElementById('novoClienteNome').value.trim();
        if (!nome) return alert('Digite o nome do cliente!');

        const agora = new Date();
        const horaStr = `${String(agora.getHours()).padStart(2, '0')}:${String(agora.getMinutes()).padStart(2, '0')}`;

        const novaComanda = {
          id: Date.now(),
          cliente: nome.toUpperCase(),
          hora: horaStr,
          itens: []
        };

        comandas.unshift(novaComanda);
        renderizarComandas();
        fecharModal('modalNovaComanda');
      }

      function abrirDetalhesComanda(comandaId) {
        comandaAtualId = comandaId;
        const c = comandas.find(item => item.id === comandaId);
        if (!c) return;

        document.getElementById('detalheClienteTitulo').innerText = `Comanda: ${c.cliente}`;
        renderizarItensDetalhe(c);
        
        document.getElementById('selectProduto').value = '';
        document.getElementById('itemNome').value = '';
        document.getElementById('itemValor').value = '';

        document.getElementById('modalDetalhes').style.display = 'flex';
      }

      function renderizarItensDetalhe(comanda) {
        const listaContainer = document.getElementById('detalheItensLista');
        listaContainer.innerHTML = '';
        let total = 0;

        if (comanda.itens.length === 0) {
          listaContainer.innerHTML = '<div style="color: #a8a8b3; font-size: 13px; text-align: center; padding: 8px;">Nenhum item adicionado.</div>';
        } else {
          comanda.itens.forEach(item => {
            total += item.valor;
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `<span>${item.desc}</span> <strong>R$ ${item.valor.toFixed(2)}</strong>`;
            listaContainer.appendChild(row);
          });
        }

        document.getElementById('detalheTotal').innerText = `Total: R$ ${total.toFixed(2)}`;
      }

      document.getElementById('selectProduto').addEventListener('change', function() {
        const option = this.options[this.selectedIndex];
        if (option.value) {
          document.getElementById('itemNome').value = option.value;
          document.getElementById('itemValor').value = option.getAttribute('data-preco');
        }
      });

      function adicionarConsumo() {
        const nomeItem = document.getElementById('itemNome').value.trim();
        const valorItem = parseFloat(document.getElementById('itemValor').value);

        if (!nomeItem || isNaN(valorItem) || valorItem <= 0) {
          return alert('Informe a descrição e um valor válido!');
        }

        const comanda = comandas.find(c => c.id === comandaAtualId);
        if (comanda) {
          comanda.itens.push({ desc: nomeItem, valor: valorItem });
          renderizarItensDetalhe(comanda);
          renderizarComandas();

          document.getElementById('selectProduto').value = '';
          document.getElementById('itemNome').value = '';
          document.getElementById('itemValor').value = '';
        }
      }

      function fecharComanda() {
        if (confirm('Deseja fechar esta comanda e finalizar o atendimento?')) {
          comandas = comandas.filter(c => c.id !== comandaAtualId);
          renderizarComandas();
          fecharModal('modalDetalhes');
        }
      }

      document.getElementById('searchInput').addEventListener('input', function() {
        const busca = this.value.toLowerCase();
        const filtradas = comandas.filter(c => c.cliente.toLowerCase().includes(busca));
        renderizarComandas(filtradas);
      });

      // Eventos
      document.getElementById('btnAbrirNovaComanda').onclick = abrirModalNovaComanda;
      document.getElementById('btnCancelarNovaComanda').onclick = () => fecharModal('modalNovaComanda');
      document.getElementById('btnCriarComanda').onclick = criarComanda;
      document.getElementById('btnInserirConsumo').onclick = adicionarConsumo;
      document.getElementById('btnFecharComanda').onclick = fecharComanda;
      document.getElementById('btnSairDetalhes').onclick = () => fecharModal('modalDetalhes');

      renderizarComandas();
    });
  </script>
</body>
</html>
