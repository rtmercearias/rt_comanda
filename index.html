<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Comandas</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
background-color: #121214;
color: #e1e1e6;
padding-bottom: 80px;
}

/* Topo */
header {
background: #1d1b26;
padding: 16px;
position: sticky;
top: 0;
z-index: 10;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.search-box {
width: 100%;
padding: 10px 14px;
border-radius: 8px;
border: 1px solid #323238;
background: #202024;
color: #fff;
font-size: 15px;
outline: none;
}

/* Cards Grid */
.grid-comandas {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 12px;
padding: 16px;
}

.card {
background: linear-gradient(135deg, #2d2a3e 0%, #1f1b2d 100%);
border: 1px solid #3e3859;
border-radius: 12px;
padding: 14px;
display: flex;
flex-direction: column;
justify-content: space-between;
min-height: 140px;
cursor: pointer;
box-shadow: 0 4px 6px rgba(0,0,0,0.3);
transition: transform 0.1s ease;
}

.card:active {
transform: scale(0.98);
}

.card-header {
display: flex;
justify-content: space-between;
align-items: flex-start;
}

.card-title {
font-size: 18px;
font-weight: bold;
color: #fff;
}

.card-time {
font-size: 10px;
color: #a8a8b3;
}

.card-status {
font-size: 11px;
color: #fba94c;
font-weight: 600;
margin-top: 4px;
}

.card-total {
font-size: 18px;
font-weight: bold;
color: #04d361;
text-align: right;
margin-top: 10px;
}

/* Botão Flutuante */
.fab {
position: fixed;
bottom: 20px;
right: 20px;
background: #734bd1;
color: #fff;
border: none;
border-radius: 30px;
padding: 14px 22px;
font-size: 16px;
font-weight: bold;
box-shadow: 0 6px 15px rgba(115, 75, 209, 0.4);
display: flex;
align-items: center;
gap: 8px;
cursor: pointer;
}

/* Modais */
.modal-overlay {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(0, 0, 0, 0.75);
display: none;
align-items: center;
justify-content: center;
z-index: 100;
padding: 16px;
}

.modal {
background: #202024;
border-radius: 12px;
padding: 20px;
width: 100%;
max-width: 420px;
max-height: 90vh;
overflow-y: auto;
}

.modal h3 {
margin-bottom: 16px;
color: #fff;
}

.form-group {
margin-bottom: 12px;
}

.form-group label {
display: block;
font-size: 13px;
margin-bottom: 4px;
color: #a8a8b3;
}

.form-group input, .form-group select {
width: 100%;
padding: 10px;
border-radius: 6px;
border: 1px solid #323238;
background: #121214;
color: #fff;
font-size: 14px;
}

.btn-group {
display: flex;
gap: 10px;
margin-top: 16px;
}

.btn {
flex: 1;
padding: 12px;
border: none;
border-radius: 6px;
font-weight: bold;
cursor: pointer;
}

.btn-primary { background: #734bd1; color: #fff; }
.btn-secondary { background: #323238; color: #fff; }
.btn-danger { background: #f75a68; color: #fff; }

/* Lista de Itens na Comanda */
.item-list {
margin: 12px 0;
border-top: 1px solid #323238;
padding-top: 10px;
}

.item-row {
display: flex;
justify-content: space-between;
font-size: 14px;
padding: 6px 0;
border-bottom: 1px solid #29292e;
}
</style>
</head>
<body>

<header>
<input type="text" id="searchInput" class="search-box" placeholder="Pesquisar por nome do cliente..." oninput="filtrarComandas()">
</header>

<main class="grid-comandas" id="comandasGrid">
<!-- Cards inseridos via JS -->
</main>

<button class="fab" onclick="abrirModalNovaComanda()">+ Nova Comanda</button>

<!-- Modal Nova Comanda -->
<div class="modal-overlay" id="modalNovaComanda">
<div class="modal">
<h3>Abrir Comanda</h3>
<div class="form-group">
<label>Nome do Cliente</label>
<input type="text" id="novoClienteNome" placeholder="Ex: Marcio, Dimi, Ale...">
</div>
<div class="btn-group">
<button class="btn btn-secondary" onclick="fecharModal('modalNovaComanda')">Cancelar</button>
<button class="btn btn-primary" onclick="criarComanda()">Criar</button>
</div>
</div>
</div>

<!-- Modal Detalhes / Adicionar Consumo -->
<div class="modal-overlay" id="modalDetalhes">
<div class="modal">
<h3 id="detalheClienteTitulo">Comanda</h3>

<div class="item-list" id="detalheItensLista">
<!-- Itens listados aqui -->
</div>

<div style="font-size: 16px; font-weight: bold; text-align: right; margin-bottom: 16px; color: #04d361;" id="detalheTotal">
Total: R$` 0,00
</div>

<hr style="border-color: #323238; margin-bottom: 16px;">

<h4>Adicionar Item</h4>
<div class="form-group" style="margin-top: 8px;">
<label>Produto Cadastrado</label>
<select id="selectProduto" onchange="selecionarProdutoCadastrado()">
<option value="">-- Selecione ou use avulso --</option>
<option value="Coca-Cola 2L" data-preco="12.00">Coca-Cola 2L - R$ 12,00&lt;/option&gt; &lt;option value="Cerveja Lata" data-preco="5.00"&gt;Cerveja Lata - R$ 5,00</option>
<option value="Salgado" data-preco="7.00">Salgado - R$ 7,00&lt;/option&gt; &lt;option value="Café Expresso" data-preco="3.50"&gt;Café Expresso - R$ 3,50</option>
</select>
</div>

<div class="form-group">
<label>Nome do Item / Descrição Avulsa</label>
<input type="text" id="itemNome" placeholder="Ex: Preço Avulso ou Cerveja">
</div>

<div class="form-group">
<label>Valor (R`$)</label>
<input type="number" step="0.01" id="itemValor" placeholder="0.00">
</div>

<button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" onclick="adicionarConsumo()">+ Inserir na Comanda</button>

<div class="btn-group">
<button class="btn btn-danger" onclick="fecharComanda()">Fechar / Pagar</button>
<button class="btn btn-secondary" onclick="fecharModal('modalDetalhes')">Sair</button>
</div>
</div>
</div>

<script>
let comandas = [
{ id: 1, cliente: "DIMI", hora: "17:32", itens: [{ desc: "Salgado", valor: 7.00 }] },
{ id: 2, cliente: "ALE", hora: "17:34", itens: [{ desc: "Café Expresso", valor: 3.50 }] },
{ id: 3, cliente: "MARCIO", hora: "17:51", itens: [] }
];

let comandaAtualId = null;

function renderizarComandas(lista = comandas) {
const grid = id('comandasGrid');
grid.innerHTML = '';

lista.forEach(c => {
const total = c.itens.reduce((acc, curr) => acc + curr.valor, 0);
const consumoTexto = c.itens.length > 0 ? R$${total.toFixed(2)} : 'Sem consumo';

const card = document.createElement('div');
card.className = 'card';
card.onclick = () => abrirDetalhesComanda(c.id);
card.innerHTML = &lt;div&gt; &lt;div class="card-header"&gt; &lt;span class="card-title"&gt;${c.cliente}</span>
<span class="card-time">${c.hora}&lt;/span&gt; &lt;/div&gt; &lt;div class="card-status"&gt;PENDENTE&lt;/div&gt; &lt;/div&gt; &lt;div class="card-total"&gt;${consumoTexto}</div>
`;
grid.appendChild(card);
});
}

function id(elementId) {
return document.getElementById(elementId);
}

function abrirModalNovaComanda() {
id('novoClienteNome').value = '';
id('modalNovaComanda').style.display = 'flex';
}

function fecharModal(modalId) {
id(modalId).style.display = 'none';
}

function criarComanda() {
const nome = id('novoClienteNome').value.trim();
if (!nome) return alert('Digite o nome do cliente!');

const agora = new Date();
const horaStr = ``${String(agora.getHours()).padStart(2, '0')}:${String(agora.getMinutes()).padStart(2, '0')};

const novaComanda = {
id: Date.now(),
cliente: nome.toUpperCase(),
hora: horaStr,
itens: []
};

comandas.unshift(novaComanda);
renderizarComandas();
fecharModal('modalNovaComanda');
}

function abrirDetalhesComanda(comandaId) {
comandaAtualId = comandaId;
const c = comandas.find(item => item.id === comandaId);
if (!c) return;

id('detalheClienteTitulo').innerText = Comanda:${c.cliente}`;
renderizarItensDetalhe(c);

// Limpa campos de inserção
id('selectProduto').value = '';
id('itemNome').value = '';
id('itemValor').value = '';

id('modalDetalhes').style.display = 'flex';
}

function renderizarItensDetalhe(comanda) {
const listaContainer = id('detalheItensLista');
listaContainer.innerHTML = '';
let total = 0;

if (comanda.itens.length === 0) {
listaContainer.innerHTML = '<div style="color: #a8a8b3; font-size: 13px; text-align: center; padding: 8px;">Nenhum item adicionado.</div>';
} else {
comanda.itens.forEach(item => {
total += item.valor;
const row = document.createElement('div');
row.className = 'item-row';
row.innerHTML = <span&gt;${item.desc}</span> <strong>R$ ${item.valor.toFixed(2)}</strong>`;
listaContainer.appendChild(row);
});
}

id('detalheTotal').innerText = Total: R$ ${total.toFixed(2)}`;
}

function selecionarProdutoCadastrado() {
const select = id('selectProduto');
const option = select.options[select.selectedIndex];
if (option.value) {
id('itemNome').value = option.value;
id('itemValor').value = option.getAttribute('data-preco');
}
}

function adicionarConsumo() {
const nomeItem = id('itemNome').value.trim();
const valorItem = parseFloat(id('itemValor').value);

if (!nomeItem || isNaN(valorItem) || valorItem <= 0) {
return alert('Informe a descrição e um valor válido!');
}

const comanda = comandas.find(c => c.id === comandaAtualId);
if (comanda) {
comanda.itens.push({ desc: nomeItem, valor: valorItem });
renderizarItensDetalhe(comanda);
renderizarComandas();

// Limpa formulário do item
id('selectProduto').value = '';
id('itemNome').value = '';
id('itemValor').value = '';
}
}

function fecharComanda() {
if (confirm('Deseja fechar esta comanda e finalizar o atendimento?')) {
comandas = comandas.filter(c => c.id !== comandaAtualId);
renderizarComandas();
fecharModal('modalDetalhes');
}
}

function filtrarComandas() {
const busca = id('searchInput').value.toLowerCase();
const filtradas = comandas.filter(c => c.cliente.toLowerCase().includes(busca));
renderizarComandas(filtradas);
}

// Inicialização
renderizarComandas();
</script>
</body>
</html>
